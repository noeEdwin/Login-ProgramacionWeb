<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al sistema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card p-4 shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="text-center mb-4">
      <h3 class="fw-bold text-dark-blue mb-1">Login</h3>
      <p class="text-muted small">Ingrese sus datos para acceder</p>
    </div>
    
  <form id="formLogin" novalidate>
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario" placeholder="Ej. Diego Alonso">
        <small id="errorUsuario" class="error-message text-danger d-block mt-1"></small>
      </div>
      
      <div class="mb-3">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="correo" placeholder="correo@gmail.com">
        <small id="errorCorreo" class="error-message text-danger d-block mt-1"></small>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          <button class="btn btn-outline-secondary btn-toggle-pass" type="button" id="btnTogglePass">
            👁
          </button>
        </div>
        <small id="errorPassword" class="error-message text-danger d-block mt-1"></small>
      </div>
      
      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary-custom py-2">Iniciar Sesión</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utileria.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
