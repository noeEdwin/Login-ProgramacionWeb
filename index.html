<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura de Alumnos - Sistema Académico</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

<!-- TopNavBar -->
<header class="fixed-top d-flex align-items-center justify-content-between bg-white border-bottom shadow-sm px-3" style="height:64px;">
    <div class="d-flex align-items-center gap-3">
        <button class="btn p-2 d-lg-none" id="menu-toggle" type="button">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <h1 class="fs-5 fw-bold text-primary mb-0">Gestión Académica</h1>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="d-none d-md-flex align-items-center gap-2 px-3 py-1 rounded-pill bg-light border">
            <span class="material-symbols-outlined">account_circle</span>
            <span class="fw-semibold text-secondary small" id="navUsuario">Admin Usuario</span>
        </div>
        <div class="dropdown">
            <button class="btn p-0 rounded-circle bg-primary" type="button" data-bs-toggle="dropdown" style="width:40px; height:40px;">
                <span class="material-symbols-outlined text-white">person</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm">
                <li class="d-md-none px-3 py-2 border-bottom">
                    <small class="fw-semibold text-secondary" id="navUsuarioMovil">Admin Usuario</small>
                </li>
                <li>
                    <a class="dropdown-item text-danger d-flex align-items-center gap-2 py-2" href="login.html" id="btnSalir">
                        <span class="material-symbols-outlined">logout</span>
                        Salir del sistema
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>

<!-- SideNavBar -->
<aside class="d-flex flex-column position-fixed start-0 border-end bg-light" id="sidebar"
       style="width:256px; height:100vh; top:64px; z-index:40;">
    <div class="px-4 py-3 mb-3 mt-2">
        <h2 class="fs-6 fw-bold text-primary mb-0">Menu</h2>
    </div>

    <nav class="flex-grow-1 px-3">
        <div class="mb-1">
            <button class="w-100 d-flex align-items-center justify-content-between border-0 rounded px-3 py-2 bg-secondary bg-opacity-10 fw-bold" id="users-toggle" type="button">
                <div class="d-flex align-items-center gap-2">
                    <span class="material-symbols-outlined">group</span>
                    Usuarios
                </div>
                <span class="material-symbols-outlined" id="chevron">expand_more</span>
            </button>
            <div class="ps-4 mt-1" id="users-submenu">
              <a class="d-block px-3 py-2 text-primary fw-bold rounded text-decoration-none bg-primary-subtle" href="#">Captura</a>
            </div>
        </div>
    </nav>
</aside>

<!-- Overlay for mobile sidebar -->
<div class="d-lg-none position-fixed top-0 start-0 w-100 h-100" id="sidebarOverlay" style="z-index:35; display:none;"></div>

<!-- Main Content Area -->
<main class="pt-5 pb-4" id="mainContent">
    <div class="container">

        <!-- Header Section -->
        <div class="bg-primary text-white rounded p-4 mb-4 shadow-sm">
            <h2 class="fs-5 fw-bold mb-1">Captura de Nuevo Alumno</h2>
            <p class="mb-0 opacity-75">Complete el formulario a continuación para registrar un nuevo estudiante en el sistema académico.</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white border rounded shadow-sm p-4">
            <form class="row g-3" id="studentForm" novalidate>

                <!-- Nombre Completo -->
                <div class="col-12">
                    <label for="nombre" class="form-label fw-semibold text-secondary">Nombre Completo</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <span class="material-symbols-outlined text-secondary">person_edit</span>
                        </span>
                        <input class="form-control" type="text" id="nombre" name="nombre" placeholder="Ej. Sánchez Chávez Edwin Noé" required>
                    </div>
                    <span class="error-message text-danger small" id="errorNombre"></span>
                </div>

                <!-- Correo Electrónico -->
                <div class="col-md-6">
                    <label for="email" class="form-label fw-semibold text-secondary">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <span class="material-symbols-outlined text-secondary">alternate_email</span>
                        </span>
                        <input class="form-control" type="email" id="email" name="email" placeholder="estudiante@correo.com" required>
                    </div>
                    <span class="error-message text-danger small" id="errorEmail"></span>
                </div>

                <!-- Número de Control -->
                <div class="col-md-6">
                    <label for="control" class="form-label fw-semibold text-secondary">Número de Control</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <span class="material-symbols-outlined text-secondary">tag</span>
                        </span>
                        <input class="form-control" type="text" id="control" name="control" maxlength="6" pattern="\d{6}" placeholder="123456" required>
                    </div>
                    <span class="error-message text-danger small" id="errorControl"></span>
                </div>

                <!-- Contraseña -->
                <div class="col-md-6">
                    <label for="password" class="form-label fw-semibold text-secondary">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <span class="material-symbols-outlined text-secondary">lock</span>
                        </span>
                        <input class="form-control" type="password" id="password" name="password" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                            <span class="material-symbols-outlined" id="pwIcon">visibility</span>
                        </button>
                    </div>
                    <span class="error-message text-danger small" id="errorPassword"></span>
                </div>

                <!-- Fecha de Nacimiento -->
                <div class="col-md-6">
                    <label for="nacimiento" class="form-label fw-semibold text-secondary">Fecha de Nacimiento</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <span class="material-symbols-outlined text-secondary">calendar_today</span>
                        </span>
                        <input class="form-control" type="date" id="nacimiento" name="nacimiento" required>
                    </div>
                    <span class="error-message text-danger small" id="errorNacimiento"></span>
                </div>

                <!-- Action Buttons -->
                <div class="col-12 pt-3 border-top mt-2 d-flex flex-column flex-md-row gap-2 justify-content-end">
                    <button class="btn btn-outline-secondary px-4" type="reset">Limpiar</button>
                    <button class="btn btn-primary px-4 shadow-sm" type="submit">Guardar Alumno</button>
                </div>

            </form>
        </div>
    </div>
</main>

<!-- Modal de Edad (oculto por defecto) -->
<div class="modal fade" id="ageModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body p-4 text-center">
                <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle bg-primary-subtle" id="modalIcon" style="width:80px; height:80px;">
                </div>
                <h5 class="fw-bold mb-2" id="modalTitle"></h5>
                <p class="text-secondary mb-4" id="modalDescription"></p>
                <button class="btn btn-primary w-100 py-2" type="button" data-bs-dismiss="modal">Entendido</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utileria.js"></script>
<script src="js/index.js"></script>

</body>
</html>
