<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
      <div class="container-fluid">

        <button class="btn btn-outline-light me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
          ☰
        </button>
        <a class="navbar-brand" href="#">Mi Sistema</a>

        <div class="d-flex align-items-center ms-auto">
          <div class="dropdown">
            <a class="btn btn-secondary dropdown-toggle" href="#" role="button" id="userDropdown" data-bs-toggle="dropdown">

              <span id="nombreUsuario">Usuario</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item text-danger" href="#" id="btnSalir">Salir del sistema</a></li>
            </ul>
          </div>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
        <h1>Bienvenido al sistema</h1>
        <p>Utiliza el menú lateral para navegar por las opciones de captura.</p>
    </div>

    <div class="offcanvas offcanvas-start" id="sidebarMenu" tabindex="-1">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button class="btn-close" data-bs-dimmiss="offcanvas"></button>
      </div>
    </div>
    <div class="offcanvas-body">
      <div class="accordion" id="accordionSidebar">
        <div class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsuarios">
              Usuarios
            </button>
          </h2>
        </div>
      </div>
    </div>
    <!-- Bootstrap 5 JS Bundle (Necesario para Navbar, Dropdowns y Modales) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Tu archivo JS de lógica -->
    <script src="js/panel.js"></script>
</body>
</html>
